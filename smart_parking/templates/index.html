<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Parking Tester</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      .thumb { max-width: 150px; max-height: 120px; margin: 4px; }
      .grid { display:flex; flex-wrap:wrap; }
    </style>
  </head>
  <body>
    <div style="max-width:680px;margin:0 auto;background:linear-gradient(180deg,#1e3c72,#2a5298);color:white;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.2)">
      <h1 style="margin:0 0 8px 0;font-size:28px">Smart Parking</h1>
      <p style="margin:0 0 16px 0;opacity:0.9">Upload an image to check slot occupancy.</p>
      <form action="/detect" method="post" enctype="multipart/form-data" style="background:white;color:#222;padding:16px;border-radius:6px">
        <label style="display:block;margin-bottom:8px">Model weights path: <input type="text" name="model" value="yolov8m.pt" size="30"></label>
        <label style="display:block;margin-bottom:8px">Confidence: <input type="text" name="conf" value="0.25" size="6"> &nbsp; BEV px/m: <input type="text" name="pxpm" value="100" size="6"></label>
        <label style="display:block;margin-bottom:8px">Slots JSON: <input type="text" name="slots" value="data/slots_example.json" size="40"></label>
        <hr>
        <label style="display:block;margin-bottom:12px">Upload image: <input type="file" name="file" accept="image/*"></label>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <input type="submit" value="Run detection" style="background:#2a5298;color:white;border:none;padding:10px 16px;border-radius:4px;cursor:pointer">
        </div>
      </form>
    </div>
  </body>

  <script>
    async function startStream(){
      const url = document.getElementById('camera_url').value;
      if(!url){ alert('Enter camera URL or index'); return }
      const form = new FormData();
      form.append('camera_url', url);
      form.append('model', document.querySelector('input[name=model]').value);
      form.append('conf', document.querySelector('input[name=conf]').value);
      form.append('pxpm', document.querySelector('input[name=pxpm]').value);
      form.append('slots', document.querySelector('input[name=slots]').value);
      form.append('frame_skip', document.getElementById('frame_skip').value || '5');
      await fetch('/start_stream', { method: 'POST', body: form });
      pollLive();
    }

    async function stopStream(){
      await fetch('/stop_stream', { method: 'POST' });
    }

    let _polling = false;
    async function pollLive(){
      if(_polling) return;
      _polling = true;
      const imgEl = document.getElementById('live_img');
      const repEl = document.getElementById('live_report');
      while(_polling){
        try{
          imgEl.src = '/latest_image?ts=' + Date.now();
          const r = await fetch('/latest_report');
          if(r.status === 200){
            const j = await r.json();
            repEl.textContent = JSON.stringify(j, null, 2);
          }
        }catch(e){}
        await new Promise(res => setTimeout(res, 1000));
      }
    }
  </script>
</html>
  </body>
</html>
